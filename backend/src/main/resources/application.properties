spring.application.name=empire-backend

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=604800000

# Server
server.port=${PORT:8180}

# Game tick: every 10 min in dev, override with TICK_MS env var
game.tick.interval-ms=${TICK_MS:600000}

# CORS - allow React dev server
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001,https://project-empire.lonetechwiz.com}
